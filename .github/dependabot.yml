version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # The minimum Home Assistant version is a deliberate support floor
      # (declared in hacs.json and requirements-dev.txt), not something to bump
      # automatically — ignore homeassistant itself.
      - dependency-name: "homeassistant"
      # Home Assistant hard-pins protobuf to an exact version (2026.4.x ships
      # protobuf==6.32.0), so ANY bump above it — major or minor — is
      # unsatisfiable against the pinned homeassistant. Ignore protobuf
      # entirely; HA controls this version. Revisit when the pinned HA version
      # changes.
      - dependency-name: "protobuf"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
